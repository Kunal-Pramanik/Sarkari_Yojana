<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GovtScheme AI Copilot</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#020617;
padding:18px;
font-size:20px;
font-weight:600;
border-bottom:1px solid #1e293b;
text-align:center;
}

header span{
color:#38bdf8;
}

.chat-container{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:18px;
}

.message{
max-width:70%;
padding:14px 18px;
border-radius:12px;
line-height:1.5;
}

.user{
align-self:flex-end;
background:#2563eb;
}

.bot{
align-self:flex-start;
background:#1e293b;
}

.sources{
font-size:12px;
margin-top:8px;
opacity:.7;
}

.input-container{
display:flex;
padding:15px;
background:#020617;
border-top:1px solid #1e293b;
}

input{
flex:1;
padding:14px;
border-radius:8px;
border:none;
outline:none;
background:#1e293b;
color:white;
}

button{
margin-left:10px;
padding:14px 20px;
border:none;
border-radius:8px;
background:#38bdf8;
color:black;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.loading{
font-size:14px;
opacity:.6;
}

</style>
</head>

<body>

<header>
🇮🇳 <span>GovtScheme AI Copilot</span>
</header>

<div class="chat-container" id="chat"></div>

<div class="input-container">
<input id="question" placeholder="Ask about government schemes..." />
<button onclick="sendMessage()">Send</button>
</div>

<script>

const API="https://govtschemes-ai.onrender.com/chat";

const chat=document.getElementById("chat");

function addMessage(text,type,sources=[]){

const msg=document.createElement("div");
msg.className="message "+type;
msg.innerHTML=text;

if(sources.length>0){

const src=document.createElement("div");
src.className="sources";

src.innerHTML="<br><b>Sources:</b><br>"+sources.map(s=>`
• ${s.scheme}
`).join("<br>");

msg.appendChild(src);

}

chat.appendChild(msg);

chat.scrollTop=chat.scrollHeight;

}

async function sendMessage(){

const input=document.getElementById("question");
const query=input.value.trim();

if(!query) return;

addMessage(query,"user");

input.value="";

const loading=document.createElement("div");
loading.className="message bot loading";
loading.innerText="Thinking...";
chat.appendChild(loading);

chat.scrollTop=chat.scrollHeight;

try{

const res=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({query})
});

const data=await res.json();

chat.removeChild(loading);

addMessage(data.answer,"bot",data.sources);

}catch(err){

chat.removeChild(loading);

addMessage("Server error. Try again.","bot");

}

}

document.getElementById("question")
.addEventListener("keypress",function(e){

if(e.key==="Enter") sendMessage();

});

</script>

</body>
</html>
